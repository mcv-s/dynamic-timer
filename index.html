<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="icon-light.png" media="(prefers-color-scheme: light)">
    <link rel="icon" href="icon-dark.png" media="(prefers-color-scheme: dark)">
  <meta charset="UTF-8">
  <title>Dynamic Timer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="light-dark-styles.css">
  <style>

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 2rem;
      background: var(--cffy-theme-surface-a10);
      font-size: 2rem;
    }

    h1 {
      margin-bottom: 0.5rem;
    }
    p {
      max-width: 600px;
      line-height: 1.5;
    }
    body {
      color: var(--cffy-theme-text-primary);
    }



    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 105vh;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 1vh;
      opacity: 0;
      filter: blur(3px);
      transition: 
        opacity 0.2s ease,
        filter 0.2s ease,
        min-height 0.2s ease;

    }

    .controls.focused {
        filter: blur(0);
        opacity: 1;
        min-height: 10vh;
    }


    button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      cursor: pointer;

      background-color: var(--cffy-theme-surface-a20);
      color: var(--cffy-theme-text-primary);

      border: none;
      border-radius: 10px;

      transition: background-color 0.2s ease, color 0.2s ease;
    }

    button:hover {
        background-color: var(--cffy-theme-surface-a30);
    }



    #TimerText {
        resize: none;
    }


    #SetTimer, #SetKey {
        background-color: var(--cffy-theme-surface-a10);
        font-size: 0.8rem;
    }

    #SetKey {

      filter: blur(3px);
      transition: filter 0.2s ease;
      opacity: 0.1;
    }

    #SetKey:hover {
        filter: blur(0);
        opacity: 1;
    }



  </style>
</head>
<body>



  <div class="main">
  <h1 id="Timer">00:00:00</h1><br>
  <div class="controls">
  

  <button onclick="toggleTimer()" id="ToggleTimer">Start Timer</button><br>
  <button onclick="setTimer()" id="SetTimer">Set Timer</button>
  
  </div>
  </div>

<button onclick="setKey()" id="SetKey">Key: </button>

    <script src="program.js"></script>
</body>
</html>
